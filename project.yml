name: QR
options:
  bundleIdPrefix: com.mmm489
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  QR:
    type: application
    platform: iOS
    sources:
      - path: QRApp.swift
      - path: Models
      - path: Views
      - path: ViewModels
      - path: Services
      - path: Extensions
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mmm489.qr
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
